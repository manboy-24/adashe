# ══════════════════════════════════════════════════════════════════════════════
# Profil PROD — activer avec : SPRING_PROFILES_ACTIVE=prod
#
# Toutes les valeurs sensibles DOIVENT être des variables d'environnement.
# Variables obligatoires :
#   DB_HOST, DB_NAME, DB_USERNAME, DB_PASSWORD
#   JWT_SECRET          (openssl rand -base64 64)
#   MAIL_USERNAME, MAIL_PASSWORD
#   FIREBASE_CREDENTIALS_JSON  (base64 du JSON du compte de service)
#   SMS_PROVIDER + clés du provider choisi (AT_API_KEY ou TWILIO_*)
# ══════════════════════════════════════════════════════════════════════════════

spring:
  # ── PostgreSQL production ──────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: TontineHikariCP
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 60000
      leak-detection-threshold: 60000   # alerte si une connexion est tenue > 60 s

  # ── Flyway ────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true   # nécessaire sur DB Railway fraîche
    validate-on-migrate: true
    out-of-order: false

  # ── JPA ───────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: none            # Flyway gère le schéma — Hibernate ne valide pas
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true

  # ── Mail production (Gmail SMTP) ──────────────────────────────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true

app:
  mail:
    from: ${MAIL_FROM:noreply@adashe.com}

# ── JWT — secret fort obligatoire ─────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}

# ── Mobile Money — URLs production ────────────────────────────────────────────
mobile-money:
  mtn:
    base-url: https://proxy.momoapi.mtn.com
    environment: mtncameroon
  orange:
    base-url: https://api.orange.com/orange-money-webpay/cm/v1

# ── Logs — stdout uniquement (Railway capture les logs console) ────────────────
logging:
  level:
    com.tontine: ${LOG_LEVEL:WARN}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# ── Swagger désactivé en prod ─────────────────────────────────────────────────
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# ── Actuator : exposition minimale ────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
